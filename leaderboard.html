<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>Таблица лидеров 👑</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Quicksand:wght@500;600;700&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="sparkles" aria-hidden="true">
    <span class="sparkle s1">✨</span>
    <span class="sparkle s2">✨</span>
    <span class="sparkle s3">⭐</span>
    <span class="sparkle s4">✨</span>
    <span class="sparkle s5">⭐</span>
  </div>

  <main id="leaderboard-main">
    <header class="title">
      <h1>Таблица лидеров <span class="crown">👑</span></h1>
      <p class="title-en">Leaderboard</p>
    </header>

    <a href="index.html" class="btn btn-secondary">← Играть / Play</a>

    <section id="leaderboard-loading">
      <div class="finished-box">
        <p class="finished-emoji">👑✨👑</p>
        <h2>
          Загрузка результатов…
          <span class="bilingual-en">Loading results…</span>
        </h2>
      </div>
    </section>

    <section id="leaderboard-error" class="hidden">
      <div class="finished-box">
        <p class="finished-emoji">😢</p>
        <h2>
          Не удалось загрузить таблицу лидеров
          <span class="bilingual-en">Couldn't load the leaderboard</span>
        </h2>
        <p class="round-over-sub">
          Проверьте подключение к интернету и попробуйте снова
          <span class="bilingual-en">Check your internet connection and try again</span>
        </p>
        <button id="retry-btn" class="btn btn-primary">Попробовать снова / Try again</button>
      </div>
    </section>

    <section id="leaderboard-content" class="hidden">
      <button id="refresh-btn" class="btn btn-primary">Обновить / Refresh</button>
      <p id="last-updated" class="last-updated"></p>

      <ol id="rank-list" class="rank-list"></ol>

      <div class="chart-container">
        <canvas id="breakdown-chart"></canvas>
      </div>
    </section>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.5.1/dist/chart.umd.min.js"></script>
  <script src="leaderboard.js"></script>
</body>
</html>
